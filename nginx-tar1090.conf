# Default server configuration
#
server {
  listen 80 default_server;
  server_name _;
  #root /usr/local/share/tar1090/html;
  index index.html;

  add_header Cache-Control no-cache;

  location /hex/ {
    types {'application/json';}
  }

  # nginx configuration for tar1090
  location /data/ {
    alias /usr/local/share/tar1090/readsb/;
    gzip_static off;
    location ~ aircraft\.json$ {
      add_header Cache-Control "public, no-cache";
      gzip on;
      gzip_static on;
    }
    location /data/traces/ {
      location ~ trace_recent {
        gzip off;
        add_header Cache-Control "public, no-cache";
        add_header Content-Encoding "gzip";
      }
      location ~ trace_full {
        gzip off;
        add_header Cache-Control "public, no-cache";
        add_header Content-Encoding "gzip";
      }
    }
    location ~ globe_.*\.json$ {
      gzip off;
      add_header Cache-Control "public, no-cache";
      add_header Content-Encoding "gzip";
    }
    location ~ .*\.binCraft$ {
      gzip off;
      add_header Cache-Control "public, no-cache";
      add_header Content-Encoding "gzip";
    }
    location ~ .*\.zst$ {
      gzip off;
      add_header Cache-Control "public, no-cache";
    }
  }

  location /re-api/ {
    gzip on;
    proxy_http_version 1.1;
    proxy_max_temp_file_size 0;
    proxy_set_header Connection $http_connection;
    proxy_set_header Host $http_host;
    proxy_pass http://unix:/usr/local/share/tar1090/readsb/api.sock:/$is_args$args;
  }

  location /osm_tiles_offline/ {
    alias /usr/local/share/osm_tiles_offline/;
  }

  location /globe_history/ {
    alias /var/globe_history/;
    gzip on;
    gzip_static off;

    location ~ /acas/ {
      default_type text/plain;
      add_header Cache-Control "public, no-cache";
      gzip_static on;
    }

    location ~ ....-..-.. {
      rewrite "^(.*)/globe_history/(....)-(..)-(..)/(.*)$" "$1/globe_history/$2/$3/$4/$5" last;
    }

    location ~ traces/ {
      gzip off;
      add_header Cache-Control "public, max-age=1209600";
      add_header Content-Encoding "gzip";
    }
    location ~ heatmap/ {
      gzip off;
      add_header Cache-Control "public, max-age=1209600";
      add_header Content-Encoding "gzip";
    }
  }

  location /chunks/ {
    alias /run/tar1090/;
    gzip_static off;
    location ~ chunk_.*\.gz$ {
      gzip off;
      add_header Cache-Control "public, max-age=86400";
      add_header Content-Type "application/json";
      add_header Content-Encoding "gzip";
    }
    location ~ current_.*\.gz$ {
      gzip off;
      add_header Cache-Control "no-cache";
      add_header Content-Type "application/json";
      add_header Content-Encoding "gzip";
    }
    location ~ .*\.json$ {
      gzip on;
      add_header Cache-Control "public, no-cache";
    }
  }

  location /aircraft_sil/ {
    alias /usr/local/share/aircraft_sil/;
    add_header Cache-Control "public, max-age=1209600";
    try_files $uri /aircraft_sil/ZZZZ.png;
  }

  location / {
    alias /usr/local/share/tar1090/html/;
    try_files $uri $uri/ =404;
    gzip off;
    gzip_static off;

    # location block priority:
    # = / exact location matches > regex matches > prefix matchs

    # exact matches
    location = /config.js {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      gzip on;
      gzip_static on;
    }
    location = /index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      gzip on;
      gzip_static on;
    }

    # regex matches
    location ~ ^/style.*\.css$ {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      gzip on;
      gzip_static on;
    }

    location ~ ^/db-.*\.js$ {
      gzip off;
      gzip_static off;
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      add_header Content-Encoding "gzip";
    }

    location ~ ^/libs/.*$ {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      gzip on;
      gzip_static on;
    }
    location ~ ^/[^/]*\.js$ {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      gzip on;
      gzip_static on;
    }

    # prefix matches
    location /images {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
    }
    location /flags {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
    }
  }

  location /graphs1090/graphs/ {
    add_header Cache-Control "public, max-age=0";
    gzip on;
    log_not_found off;
    alias /run/graphs1090/;
  }

  location /graphs1090 {
    alias /usr/share/graphs1090/html/;
    absolute_redirect off;
    try_files $uri $uri/ =404;

    add_header Cache-Control "public, max-age=0";
    gzip on;
  }

  location /perf {
    absolute_redirect off;
    rewrite ^/perf$ /graphs1090/ permanent;
  }
}
